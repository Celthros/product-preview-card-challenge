<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<link rel="preload" href="style.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
	<noscript><link rel="stylesheet" href="style.min.css"></noscript>
	<title>Frontend Mentor | Product preview card component</title>
</head>
<body>
<main>
	<section class="card">
		<div class="card__image">
			<figure>
				<img src="images/image-product-desktop.jpg" width="300" height="456" alt="Product preview card component">
			</figure>
		</div>
		<div class="card__content">
			<header class="card__header">
				<div class="card__category">
					<span>Perfume</span>
				</div>

				<div class="card__product_name">
					<h1>Gabrielle Essence Eau De Parfum</h1>
				</div>
				<div class="card__product_description">
					<p>A floral, solar and voluptuous interpretation composed by Olivier Polge,
					Perfumer-Creator for the House of CHANEL.</p>
				</div>
			</header>
			<div class="card__price">
					<span class="card__sale_price">$149.99</span><span class="card__msrp_price"><s>$169.99</s></span>
			</div>

			<button type="button" class="card__btn" onclick="event.preventDefault();"><img src="images/icon-cart.svg" alt="card-item">Add to Cart</button>
		</div>
	</section>
</main>
</body>
</html>
